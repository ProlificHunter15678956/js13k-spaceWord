name: Versioning

on:
  workflow_dispatch:  # Déclenchement manuel
    inputs:
      version:
        description: 'Numéro de version (ex: 1.2.3)'
        required: true
        type: string

jobs:
  versioning:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout du code
      - name: Checkout du code
        uses: actions/checkout@v4  # v4 plus récent que v3

      # 2. Envoi de la version vers un webhook
      - name: Versioning Auto
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}  # Stocké en secret !
        run: |
          VERSION="${{ github.event.inputs.version }}"
          
          # Construction du JSON proprement
          PAYLOAD=$(jq -n --arg v "$VERSION" '{"version": $v}')
          
          # Envoi avec gestion d'erreurs
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --fail-with-body || exit 1
