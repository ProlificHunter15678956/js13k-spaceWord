name: Audit Node.js Code
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: ["main"]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 18.20.8
      uses: actions/setup-node@v4
      with:
        node-version: 18.20.8
        cache: 'npm'
    - run: npm ci
    - run: npm audit --audit-level=high
